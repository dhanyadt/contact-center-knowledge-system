<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — SupportIQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2563EB;--brand-light:#EFF6FF;--brand-dark:#1D4ED8;
  --teal:#2DD4BF;--teal-light:#CFFAFE;
  --surface:#FFFFFF;--bg:#EEF5FF;--border:#E2ECF5;
  --text-primary:#122B44;--text-secondary:#4A5F7A;--text-muted:#7C8BA0;
  --danger:#EF4444;--danger-light:#FEF2F2;
  --radius-sm:8px;--radius-md:14px;--radius-lg:22px;--radius-xl:28px;
  --bounce:cubic-bezier(0.34,1.56,0.64,1);
  --font:'DM Sans','Segoe UI',sans-serif;
}
body{font-family:var(--font);background:linear-gradient(150deg,#fff 0%,#EEF5FF 60%,#E5EFFF 100%);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}

@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spinBlob{to{transform:rotate(360deg)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.3)}50%{box-shadow:0 0 0 10px rgba(37,99,235,0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.blob1{position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(45,212,191,.07),transparent 70%);top:-140px;right:-120px;border-radius:50%;animation:spinBlob 28s linear infinite;pointer-events:none}
.blob2{position:fixed;width:360px;height:360px;background:radial-gradient(circle,rgba(37,99,235,.06),transparent 70%);bottom:-100px;left:-80px;border-radius:50%;animation:spinBlob 36s reverse infinite;pointer-events:none}

/* Top nav bar */
.topnav{padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:38px;height:38px;background:var(--brand);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(37,99,235,.3);transition:transform .2s}
.logo:hover .logo-icon{transform:scale(1.08)}
.logo-text{font-size:18px;font-weight:700;background:linear-gradient(135deg,#122B44,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px}
.nav-badge{font-size:11px;font-weight:600;background:rgba(255,243,197,.9);color:#92400E;border:1px solid #FDE68A;padding:4px 12px;border-radius:40px;backdrop-filter:blur(4px)}

.page-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;z-index:10}

.login-wrapper{width:100%;max-width:420px;animation:slideUp .55s ease both}

.login-head{text-align:center;margin-bottom:32px}
.login-icon{width:64px;height:64px;background:linear-gradient(145deg,var(--brand),#4F7DF3);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 24px rgba(37,99,235,.36);animation:pulseGlow 2.5s infinite}
.login-head h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.login-head p{font-size:15px;color:var(--text-secondary)}

.login-card{background:rgba(255,255,255,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(226,236,245,.8);border-radius:var(--radius-xl);padding:32px;box-shadow:0 20px 40px -16px rgba(37,99,235,.14)}

.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.pw-wrap{position:relative}
.field input{width:100%;font-family:var(--font);font-size:15px;color:var(--text-primary);background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:12px 44px 12px 16px;outline:none;transition:all .18s}
.field input:focus{border-color:var(--brand);background:white;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field input.error{border-color:var(--danger);box-shadow:0 0 0 3px rgba(239,68,68,.08)}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted);padding:0;line-height:1;transition:color .15s}
.toggle-pw:hover{color:var(--text-secondary)}

.error-box{background:var(--danger-light);border:1px solid #FECACA;border-radius:var(--radius-md);padding:11px 14px;margin-bottom:16px;font-size:13px;color:var(--danger);display:none;align-items:center;gap:8px;font-weight:500}
.error-box.show{display:flex}

.submit-btn{width:100%;background:linear-gradient(145deg,var(--brand-dark),var(--brand));color:white;border:none;border-radius:40px;padding:14px;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;transition:all .25s var(--bounce);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 22px -6px rgba(37,99,235,.46);margin-top:4px}
.submit-btn:hover:not(:disabled){transform:scale(1.03);box-shadow:0 14px 28px -8px rgba(37,99,235,.52)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;font-size:12px;color:var(--text-muted)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.back-link{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--text-secondary);text-decoration:none;padding:10px;border:1px solid var(--border);border-radius:40px;background:rgba(255,255,255,.7);transition:all .2s var(--bounce)}
.back-link:hover{background:white;border-color:rgba(37,99,235,.2);color:var(--brand);transform:scale(1.02)}

.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:none}

.features-strip{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.feat-chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text-secondary);background:rgba(255,255,255,.7);border:1px solid var(--border);border-radius:40px;padding:5px 14px;backdrop-filter:blur(4px)}

.login-footer{text-align:center;padding:20px;font-size:12px;color:var(--text-muted);position:relative;z-index:10}
</style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<div class="topnav">
  <a href="http://localhost:5000" class="logo" target="_blank">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18" fill="none" width="20" height="20">
        <circle cx="9" cy="7" r="2.5" fill="white"/>
        <path d="M4.5 14c0-2.2 2-3.5 4.5-3.5s4.5 1.3 4.5 3.5" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="logo-text">SupportIQ</span>
  </a>
  <div class="nav-badge">Admin Access</div>
</div>

<div class="page-center">
  <div class="login-wrapper">
    <div class="login-head">
      <div class="login-icon">
        <svg viewBox="0 0 24 24" fill="none" width="28" height="28">
          <rect x="5" y="11" width="14" height="10" rx="2" stroke="white" stroke-width="1.8"/>
          <path d="M8 11V7a4 4 0 018 0v4" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to access the admin dashboard.</p>
    </div>

    <div class="login-card">

      <div class="error-box" id="error-box">
        <span>⚠</span>
        <span id="error-text">Incorrect password. Please try again.</span>
      </div>

      <div class="field">
        <label for="password">Admin password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
         
        </div>
      </div>

      <button class="submit-btn" id="login-btn" onclick="handleLogin()">
        <span id="btn-text">Sign in</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div style="margin-top:14px;text-align:center;font-size:13px;color:#4A5F7A;">
        <strong>Demo Access</strong><br>
        
      </div>

      <button class="submit-btn" style="margin-top:12px;background:#EEF6FF;color:#2563EB;box-shadow:none;" onclick="fillDemo()">
        Use Demo Credentials
      </button>

      <div class="divider">or</div>

      <a href="http://localhost:5000" class="back-link" target="_blank">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Go to public site
      </a>
    </div>

    <div class="features-strip">
      <div class="feat-chip">🗂 Manage categories</div>
      <div class="feat-chip">📚 Knowledge base</div>
      <div class="feat-chip">✉️ Customer messages</div>
    </div>
  </div>
</div>

<div class="login-footer">SupportIQ Admin Panel · Restricted access </div>

<script>
function fillDemo(){
  document.getElementById("password").value="contactcenter@236004";
}

function isTokenValid(){
  const t=localStorage.getItem("adminToken");
  if(!t)return false;
  try{const p=JSON.parse(atob(t.split(".")[1]));return p.exp*1000>Date.now()}catch{return false}
}
if(isTokenValid())window.location.href="/";

function togglePw(){const i=document.getElementById("password");i.type=i.type==="password"?"text":"password"}

async function handleLogin(){
  const password=document.getElementById("password").value;
  const btn=document.getElementById("login-btn");
  const spinner=document.getElementById("spinner");
  const btnText=document.getElementById("btn-text");
  const errorBox=document.getElementById("error-box");
  const errorTxt=document.getElementById("error-text");
  const input=document.getElementById("password");
  if(!password){input.classList.add("error");errorTxt.textContent="Please enter your password.";errorBox.classList.add("show");input.focus();return}
  input.classList.remove("error");errorBox.classList.remove("show");
  btn.disabled=true;btnText.textContent="Signing in…";spinner.style.display="block";
  try{
    const res=await fetch("http://localhost:5001/login", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||"Login failed");
    localStorage.setItem("adminToken",data.token);
    window.location.href="/";
  }catch(err){
    errorTxt.textContent=err.message||"Something went wrong. Please try again.";
    errorBox.classList.add("show");input.classList.add("error");input.value="";input.focus();
    btn.disabled=false;btnText.textContent="Sign in";spinner.style.display="none";
  }
}
document.getElementById("password").addEventListener("keypress",e=>{if(e.key==="Enter")handleLogin()});
</script>
</body>
</html>
