<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupportIQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:       #2563EB;
    --brand-light: #EFF6FF;
    --brand-dark:  #1D4ED8;
    --surface:     #FFFFFF;
    --bg:          #F8FAFC;
    --border:      #E2E8F0;
    --text-primary:   #0F172A;
    --text-secondary: #64748B;
    --text-muted:     #94A3B8;
    --accent:      #10B981;
    --radius-sm:   6px;
    --radius-md:   10px;
    --radius-lg:   16px;
    --shadow-sm:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:   0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --font: 'DM Sans', 'Segoe UI', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--brand);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 18px; height: 18px; }

  .logo-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    transition: background 0.15s, color 0.15s;
  }

  nav a:hover {
    background: var(--bg);
    color: var(--text-primary);
  }

  nav a.active {
    background: var(--brand-light);
    color: var(--brand);
  }

  nav .nav-cta {
    background: var(--brand);
    color: white;
    margin-left: 8px;
    padding: 6px 16px;
  }

  nav .nav-cta:hover {
    background: var(--brand-dark);
    color: white;
  }

  /* ── Page container ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  /* ── Page title block ── */
  .page-header {
    margin-bottom: 32px;
  }

  .page-header h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .page-header p {
    font-size: 15px;
    color: var(--text-secondary);
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }

  /* ── Button ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--brand);
    color: white;
    border-color: var(--brand);
  }

  .btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); }

  .btn-secondary {
    background: var(--surface);
    color: var(--text-primary);
    border-color: var(--border);
  }

  .btn-secondary:hover { background: var(--bg); }

  /* ── Chip/badge ── */
  .badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
  }

  .badge-blue   { background: var(--brand-light); color: var(--brand); }
  .badge-green  { background: #ECFDF5; color: #059669; }

  /* ── Shared input ── */
  input[type="text"], input[type="email"], textarea, select {
    font-family: var(--font);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 13px;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }

  textarea { resize: vertical; min-height: 110px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 2C5.13 2 2 5.13 2 9s3.13 7 7 7 7-3.13 7-7-3.13-7-7-7zm0 3a2 2 0 110 4 2 2 0 010-4zm0 9.4a5.04 5.04 0 01-4.2-2.26C4.82 10.7 7.53 10 9 10c1.47 0 4.18.7 4.2 2.14A5.04 5.04 0 019 14.4z" fill="white"/>
        </svg>
      </div>
      <span class="logo-text">SupportIQ</span>
    </a>

    <nav>
      <a href="/">Home</a>
      <a href="categories.html">Categories</a>
      <a href="faq.html">FAQ</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="nav-cta btn">Contact</a>
    </nav>
  </div>
</header>

<div class="container" id="content"></div>

</body>
</html>
